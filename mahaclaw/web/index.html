<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maha Claw</title>
<style>
:root {
  --bg: #0f0f0f; --fg: #e0e0e0; --input-bg: #1a1a1a;
  --border: #333; --accent: #7c6fc6; --accent2: #5a4f9e;
  --msg-user: #1e1e2e; --msg-bot: #1a1a1a;
  --green: #4caf50; --yellow: #ff9800; --red: #f44336;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --input-bg: #fff;
    --border: #ddd; --accent: #5a4f9e; --accent2: #7c6fc6;
    --msg-user: #e8e5f5; --msg-bot: #f0f0f0;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg); color: var(--fg);
  height: 100vh; display: flex; flex-direction: column;
}
header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 600; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--yellow); flex-shrink: 0;
}
.status-dot.connected { background: var(--green); }
.status-dot.error { background: var(--red); }
.mode-label {
  font-size: 11px; color: var(--accent); margin-left: auto;
  opacity: 0.7;
}
#messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.msg {
  max-width: 720px; padding: 10px 14px; border-radius: 12px;
  line-height: 1.5; font-size: 14px; white-space: pre-wrap;
  word-wrap: break-word;
}
.msg.user {
  background: var(--msg-user); align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.msg.bot {
  background: var(--msg-bot); align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.msg.system {
  align-self: center; font-size: 12px; opacity: 0.5;
  background: none; padding: 4px;
}
.typing {
  align-self: flex-start; font-size: 12px; opacity: 0.5;
  padding: 4px 14px;
}
#input-area {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
#input {
  flex: 1; padding: 10px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--input-bg);
  color: var(--fg); font-size: 14px; font-family: inherit;
  outline: none; resize: none; min-height: 42px; max-height: 120px;
}
#input:focus { border-color: var(--accent); }
#send {
  padding: 10px 20px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font-size: 14px;
  cursor: pointer; font-weight: 500; align-self: flex-end;
}
#send:hover { background: var(--accent2); }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <div class="status-dot" id="dot"></div>
  <h1>Maha Claw</h1>
  <span class="mode-label" id="mode"></span>
</header>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
  <button id="send">Send</button>
</div>
<script>
const $ = s => document.querySelector(s);
const messages = $('#messages');
const input = $('#input');
const sendBtn = $('#send');
const dot = $('#dot');
const modeLabel = $('#mode');

const SESSION_KEY = 'mahaclaw_session';
let sessionId = sessionStorage.getItem(SESSION_KEY);
if (!sessionId) {
  sessionId = Array.from(crypto.getRandomValues(new Uint8Array(12)),
    b => b.toString(16).padStart(2, '0')).join('');
  sessionStorage.setItem(SESSION_KEY, sessionId);
}

let ws = null;
let reconnectTimer = null;
const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws`;

function addMsg(text, cls) {
  const d = document.createElement('div');
  d.className = `msg ${cls}`;
  d.textContent = text;
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
  return d;
}

let typingEl = null;
function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.textContent = 'thinking...';
  messages.appendChild(typingEl);
  messages.scrollTop = messages.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function connect() {
  if (ws && ws.readyState <= 1) return;
  dot.className = 'status-dot';
  modeLabel.textContent = 'connecting...';

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    dot.className = 'status-dot connected';
    modeLabel.textContent = 'connected';
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = (e) => {
    hideTyping();
    try {
      const data = JSON.parse(e.data);
      if (data.text) {
        addMsg(data.text, 'bot');
      } else if (data.error) {
        addMsg(data.error, 'system');
      }
      if (data.mode) modeLabel.textContent = data.mode;
    } catch {
      addMsg(e.data, 'bot');
    }
    sendBtn.disabled = false;
  };

  ws.onclose = () => {
    dot.className = 'status-dot error';
    modeLabel.textContent = 'disconnected';
    hideTyping();
    sendBtn.disabled = false;
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    dot.className = 'status-dot error';
  };
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  addMsg(text, 'user');
  ws.send(JSON.stringify({ text, session_id: sessionId }));
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

connect();
addMsg('Welcome to Maha Claw. All 25 Sankhya elements are active.', 'system');
</script>
</body>
</html>
