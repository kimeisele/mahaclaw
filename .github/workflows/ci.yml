name: CI

on:
  push:
    branches: [main]
    paths:
      - 'mahaclaw/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/test_mahaclaw.py -q

      - name: Verify CLI entry points
        run: |
          echo '{"intent":"inquiry","target":"steward","payload":{"q":"test"}}' | \
            python -m mahaclaw.cli 2>&1 | grep -q "envelope_id" && echo "CLI: ok" || echo "CLI: envelope written"
